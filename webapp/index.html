<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Bluestonex — Reconciliation Monitor</title>
	<link rel="icon" type="image/svg+xml" href="img/favicon.svg">
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">

	<!-- Full-height chain so the DynamicPage can size its content correctly. -->
	<style>
		html, body {
			height: 100%;
			margin: 0;
		}
	</style>

	<script
		id="sap-ui-bootstrap"
		src="https://ui5.sap.com/resources/sap-ui-core.js"
		data-sap-ui-theme="sap_horizon"
		data-sap-ui-resourceroots='{"com.bluestonex.cloudwmreconcilliationui": "./"}'
		data-sap-ui-compatVersion="edge"
		data-sap-ui-async="true"
		data-sap-ui-frameOptions="trusted">
	</script>

	<!-- Place the component container explicitly with height 100% (a declarative
	     ComponentSupport div has no height, which collapses the DynamicPage). -->
	<script>
		sap.ui.require([
			"sap/ui/core/ComponentContainer",
			"sap/ui/core/Core"
		], function (ComponentContainer, Core) {
			Core.ready(function () {
				new ComponentContainer({
					name: "com.bluestonex.cloudwmreconcilliationui",
					manifest: true,
					async: true,
					height: "100%",
					settings: { id: "cloudwmreconcilliationui" }
				}).placeAt("content");
			});
		});
	</script>
</head>
<body class="sapUiBody sapUiSizeCompact" id="content">
</body>
</html>
