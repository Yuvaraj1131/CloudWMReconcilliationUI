<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 280" width="100%" height="100%" role="img" aria-label="Warehouse picker pushing a cart">
	<style>
		.wmStroke { stroke: #15243a; stroke-width: 3.5; stroke-linejoin: round; stroke-linecap: round; }
		.wmBob   { animation: wmBob 1.4s ease-in-out infinite; }
		.wmWheel { transform-box: fill-box; transform-origin: 50% 50%; animation: wmSpin 1s linear infinite; }
		.wmDash  { animation: wmDash 1.3s linear infinite; }
		.wmDash.d2 { animation-delay: .45s; }
		.wmDash.d3 { animation-delay: .9s; }
		.wmSpark { animation: wmSpark 1.8s ease-in-out infinite; transform-box: fill-box; transform-origin: 50% 50%; }
		@keyframes wmBob   { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
		@keyframes wmSpin  { to { transform: rotate(360deg); } }
		@keyframes wmDash  { 0% { opacity: 0; transform: translateX(14px); } 40% { opacity: 1; } 100% { opacity: 0; transform: translateX(-28px); } }
		@keyframes wmSpark { 0%,100% { opacity: .2; transform: scale(.7); } 50% { opacity: 1; transform: scale(1.1); } }
	</style>

	<!-- ground shadow -->
	<ellipse cx="206" cy="248" rx="152" ry="12" fill="#15243a" opacity="0.10"/>

	<!-- motion lines (speed) -->
	<g stroke="#e76500" stroke-width="6" stroke-linecap="round">
		<line class="wmDash"    x1="58" y1="150" x2="96" y2="150"/>
		<line class="wmDash d2" x1="44" y1="180" x2="86" y2="180"/>
		<line class="wmDash d3" x1="60" y1="210" x2="94" y2="210"/>
	</g>

	<!-- graffiti sparkles -->
	<g fill="#e76500">
		<path class="wmSpark" d="M330 70 l4 10 10 4 -10 4 -4 10 -4 -10 -10 -4 10 -4 z"/>
		<path class="wmSpark" style="animation-delay:.6s" d="M356 120 l3 7 7 3 -7 3 -3 7 -3 -7 -7 -3 7 -3 z"/>
	</g>

	<!-- ===================== PICKER ===================== -->
	<g class="wmBob">
		<!-- back leg -->
		<path class="wmStroke" d="M150 198 l-8 38" stroke="#22304a" stroke-width="13" fill="none"/>
		<!-- front leg -->
		<path class="wmStroke" d="M168 198 l18 36" stroke="#15243a" stroke-width="13" fill="none"/>
		<!-- shoes -->
		<path class="wmStroke" d="M138 236 h20" stroke="#15243a" stroke-width="8" fill="none"/>
		<path class="wmStroke" d="M182 234 h22" stroke="#15243a" stroke-width="8" fill="none"/>
		<!-- torso / hi-vis vest -->
		<path class="wmStroke" d="M132 122 q24 -16 50 0 l-6 80 q-22 11 -42 0 z" fill="#0070f2"/>
		<!-- hi-vis stripe -->
		<path d="M134 152 q22 10 46 0" stroke="#ffd000" stroke-width="7" fill="none" stroke-linecap="round"/>
		<!-- pushing arm -->
		<path class="wmStroke" d="M178 134 l46 18" stroke="#0070f2" stroke-width="14" fill="none"/>
		<!-- hand -->
		<circle class="wmStroke" cx="226" cy="153" r="7" fill="#f4c08a"/>
		<!-- head -->
		<circle class="wmStroke" cx="150" cy="98" r="20" fill="#f4c08a"/>
		<!-- cap -->
		<path class="wmStroke" d="M126 96 q4 -30 34 -28 q22 2 24 24 q-30 -14 -58 4 z" fill="#e76500"/>
		<path class="wmStroke" d="M124 96 h22" stroke="#cc5200" stroke-width="6"/>
	</g>

	<!-- ===================== CART ===================== -->
	<g>
		<!-- handle -->
		<path class="wmStroke" d="M226 152 l20 -6" stroke="#5b738e" stroke-width="7" fill="none"/>
		<path class="wmStroke" d="M246 146 l20 70" stroke="#5b738e" stroke-width="7" fill="none"/>
		<!-- basket -->
		<path class="wmStroke" d="M250 200 l-12 -54 h92 l-12 54 z" fill="#aebfd0"/>
		<!-- basket mesh -->
		<g stroke="#5b738e" stroke-width="2.5" opacity="0.8">
			<line x1="258" y1="172" x2="316" y2="172"/>
			<line x1="262" y1="146" x2="270" y2="200"/>
			<line x1="288" y1="146" x2="288" y2="200"/>
			<line x1="312" y1="146" x2="306" y2="200"/>
		</g>
		<!-- boxes -->
		<rect class="wmStroke" x="256" y="116" width="40" height="36" rx="3" fill="#f0a64a"/>
		<path d="M256 134 h40 M276 116 v36" stroke="#cf7e2e" stroke-width="2.5"/>
		<rect class="wmStroke" x="298" y="124" width="30" height="28" rx="3" fill="#f7c277"/>
		<path d="M298 138 h30 M313 124 v28" stroke="#cf7e2e" stroke-width="2.5"/>
		<!-- wheels -->
		<g>
			<circle class="wmStroke" cx="260" cy="214" r="15" fill="#15243a"/>
			<circle class="wmWheel" cx="260" cy="214" r="9" fill="none" stroke="#aebfd0" stroke-width="4" stroke-dasharray="4 7"/>
			<circle cx="260" cy="214" r="3" fill="#aebfd0"/>
			<circle class="wmStroke" cx="314" cy="214" r="15" fill="#15243a"/>
			<circle class="wmWheel" cx="314" cy="214" r="9" fill="none" stroke="#aebfd0" stroke-width="4" stroke-dasharray="4 7"/>
			<circle cx="314" cy="214" r="3" fill="#aebfd0"/>
		</g>
	</g>
</svg>
