# yaml-language-server: $schema=https://sap.github.io/ui5-tooling/schema/ui5.yaml.json

specVersion: "3.1"
metadata:
  name: com.bluestonex.cloudwmreconcilliationui
type: application
framework:
  name: SAPUI5
  version: "1.120.6"
  libraries:
    - name: sap.m
    - name: sap.ui.core
    - name: sap.ui.layout
    - name: sap.f
    - name: sap.tnt
    - name: sap.ui.table
    - name: sap.ui.export
    - name: themelib_sap_horizon
resources:
  configuration:
    propertiesFileSourceEncoding: UTF-8
builder:
  resources:
    excludes:
      - /test/**
      - /localService/**
  customTasks:
    - name: ui5-task-zipper
      afterTask: generateCachebusterInfo
      configuration:
        archiveName: combluestonexcloudwmreconcilliationui
        relativePaths: true
        additionalFiles:
          - xs-app.json
