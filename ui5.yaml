specVersion: "3.1"
metadata:
  name: com.bluestonex.cloudwmreconcilliationui
type: application
framework:
  name: SAPUI5
  version: "1.120.6"
  libraries:
    - name: sap.m
    - name: sap.ui.core
    - name: sap.ui.layout
    - name: sap.f
    - name: sap.tnt
    - name: sap.ui.table
    - name: themelib_sap_horizon
server:
  customMiddleware:
    # ---------------------------------------------------------------------
    # Dev proxy for BAS preview. Forwards /ReconcileServices/* to the CAP.
    #
    #  - LOCAL CAP (cds watch in this workspace):  url: http://localhost:4004   <-- active
    #  - DEPLOYED CAP (via BTP destination):       destination: CloudWMReconcilliation
    #
    # Swap the two lines below to switch. Deployment itself is unaffected — it
    # uses the destination route in xs-app.json, not this file.
    # ---------------------------------------------------------------------
    - name: fiori-tools-proxy
      afterMiddleware: compression
      configuration:
        ignoreCertError: true
        backend:
          # Local CAP running on port 4004 (same workspace as the UI dev server).
          - path: /ReconcileServices
            url: http://localhost:4004
        ui5:
          path:
            - /resources
            - /test-resources
          url: https://ui5.sap.com
    - name: fiori-tools-appreload
      afterMiddleware: compression
      configuration:
        port: 35729
        path: webapp
        delay: 300
