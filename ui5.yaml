specVersion: "3.1"
metadata:
  name: com.bluestonex.cloudwmreconcilliationui
type: application
framework:
  name: SAPUI5
  version: "1.120.6"
  libraries:
    - name: sap.m
    - name: sap.ui.core
    - name: sap.ui.layout
    - name: sap.f
    - name: themelib_sap_horizon
server:
  customMiddleware:
    # ---------------------------------------------------------------------
    # Local dev proxy for BAS. Forwards /ReconcileService/* to the deployed CAP
    # app via the CloudWMReconcilliation destination. This keeps the preview
    # same-origin so the browser avoids CORS.
    # ---------------------------------------------------------------------
    - name: fiori-tools-proxy
      afterMiddleware: compression
      configuration:
        ignoreCertError: true
        backend:
          # All 3 services live under /ReconcileService on one CAP app, reached
          # through the CloudWMReconcilliation destination.
          - path: /ReconcileService
            destination: CloudWMReconcilliation
        ui5:
          path:
            - /resources
            - /test-resources
          url: https://ui5.sap.com
    - name: fiori-tools-appreload
      afterMiddleware: compression
      configuration:
        port: 35729
        path: webapp
        delay: 300
