_schema-version: "3.3.0"
ID: cloudwmreconcilliationui
version: 1.0.0
description: "Cloud WM Utilities (Reconciliation Monitor + Pick Info)"
parameters:
  enable-parallel-deployments: true

modules:
  # --- 1. Build the UI5 app into dist/ and zip it -----------------------
  - name: cloudwmreconcilliationui
    type: html5
    path: .
    build-parameters:
      builder: custom
      commands:
        - npm install
        - npm run build
      build-result: dist
      supported-platforms: []

  # --- 2. Deploy the built app into the HTML5 Application Repository -----
  - name: cloudwmreconcilliationui-app-content
    type: com.sap.application.content
    path: .
    requires:
      - name: cloudwmreconcilliationui-repo-host
        parameters:
          content-target: true
    build-parameters:
      build-result: resources
      requires:
        - artifacts:
            - cloudwmreconcilliationui.zip
          name: cloudwmreconcilliationui
          target-path: resources/

  # --- 3. Create the design-time destinations the managed approuter /
  #        Work Zone need to serve and discover the app ------------------
  - name: cloudwmreconcilliationui-destination-content
    type: com.sap.application.content
    requires:
      - name: cloudwmreconcilliationui-destination-service
        parameters:
          content-target: true
      - name: cloudwmreconcilliationui-repo-host
        parameters:
          service-key:
            name: cloudwmreconcilliationui-repo-host-key
      - name: cloudwmreconcilliationui-uaa
        parameters:
          service-key:
            name: cloudwmreconcilliationui-uaa-key
    parameters:
      content:
        instance:
          existing_destinations_policy: update
          destinations:
            - Name: cloudwmreconcilliationui_html_repo_host
              ServiceInstanceName: cloudwmreconcilliationui-html5-srv
              ServiceKeyName: cloudwmreconcilliationui-repo-host-key
              sap.cloud.service: com.bluestonex.cloudwmreconcilliationui
            - Name: cloudwmreconcilliationui_uaa
              Authentication: OAuth2UserTokenExchange
              ServiceInstanceName: cloudwmreconcilliationui-uaa
              ServiceKeyName: cloudwmreconcilliationui-uaa-key
              sap.cloud.service: com.bluestonex.cloudwmreconcilliationui
    build-parameters:
      no-source: true

resources:
  # HTML5 app host (where the built UI lives)
  - name: cloudwmreconcilliationui-repo-host
    type: org.cloudfoundry.managed-service
    parameters:
      service: html5-apps-repo
      service-name: cloudwmreconcilliationui-html5-srv
      service-plan: app-host

  # Auth (xsuaa)
  - name: cloudwmreconcilliationui-uaa
    type: org.cloudfoundry.managed-service
    parameters:
      service: xsuaa
      service-name: cloudwmreconcilliationui-uaa
      service-plan: application
      path: ./xs-security.json

  # Destination service (also exposes the subaccount "CloudWMReconcilliation"
  # destination to the managed approuter at runtime, via xs-app.json)
  - name: cloudwmreconcilliationui-destination-service
    type: org.cloudfoundry.managed-service
    parameters:
      service: destination
      service-name: cloudwmreconcilliationui-destination-service
      service-plan: lite
      config:
        HTML5Runtime_enabled: true
        version: 1.0.0
        init_data:
          instance:
            existing_destinations_policy: update
            destinations:
              - Name: ui5
                URL: https://ui5.sap.com
                Authentication: NoAuthentication
                ProxyType: Internet
                Type: HTTP
